services:
  linux-share-manager:
    build:
      context: .
    image: linux-share-manager:local
    container_name: linux-share-manager
    restart: unless-stopped
    environment:
      LSM_HOST: 0.0.0.0
      LSM_PORT: "18088"
      LSM_DATABASE_PATH: /app/data/linux-share-manager.sqlite
      LSM_STATIC_ROOT: /app/dist/web
      LSM_SECRET_KEY: change-this-local-docker-secret-before-production
      LSM_SESSION_COOKIE_NAME: lsm_session
      LSM_SESSION_TTL_SECONDS: "86400"
      LSM_SSH_CONNECT_TIMEOUT_MS: "5000"
      LSM_SECURE_COOKIE: "false"
      LSM_TRUST_PROXY: "true"
    ports:
      - "18088:18088"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const r = await fetch('http://127.0.0.1:18088/api/health'); process.exit(r.ok ? 0 : 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
